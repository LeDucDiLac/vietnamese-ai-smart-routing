# Simulated model registry (plan §5, §11).
#
# Each entry is a model's "capability profile": skill score per task_type (0-1),
# cost in USD per 1k output tokens, latency in ms per 1k tokens, and the
# permission groups allowed to use it.
#
# Seed values are plausible figures drawn from public benchmarks + published API
# pricing (RouterBench-style). They are NOT the real Viettel numbers — when the
# actual Gateway model list arrives, replace this file; nothing else changes.
#
# skills keys MUST match task_type ids in label_schema.yaml.

defaults:
  # fallback skill for any task_type not explicitly listed on a model
  skill_floor: 0.40

models:
